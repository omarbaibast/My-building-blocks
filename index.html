<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Building Blocks</title>
<style>
  body { margin: 0; overflow: hidden; touch-action: none; }
  #ui {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-family: sans-serif;
    background: rgba(0,0,0,0.5);
    padding: 5px 10px;
    border-radius: 5px;
  }
  button { margin: 2px; }
</style>
</head>
<body>
<div id="ui">
  <span>Gun: </span>
  <button onclick="selectGun(0)">Pistol</button>
  <button onclick="selectGun(1)">Shotgun</button>
  <button onclick="selectGun(2)">Rifle</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/controls/PointerLockControls.js"></script>

<script>
// Scene setup
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// Controls
let controls = new THREE.PointerLockControls(camera, renderer.domElement);
document.body.addEventListener('click', ()=>controls.lock());

// Ground
let groundGeo = new THREE.BoxGeometry(50,1,50);
let groundMat = new THREE.MeshStandardMaterial({color:0x228B22});
let ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.y = -0.5;
scene.add(ground);

// Voxels
let voxelSize = 1;
let voxelMaterial = new THREE.MeshStandardMaterial({color:0x8B4513});
let voxels = [];

function addVoxel(x,y,z){
  let geo = new THREE.BoxGeometry(voxelSize, voxelSize, voxelSize);
  let voxel = new THREE.Mesh(geo, voxelMaterial.clone());
  voxel.position.set(x,y,z);
  scene.add(voxel);
  voxels.push(voxel);
}

// Shooting
let bullets = [];
let bulletSpeed = 1;

function shoot(){
  let bulletGeo = new THREE.SphereGeometry(0.1,8,8);
  let bulletMat = new THREE.MeshStandardMaterial({color:0xff0000});
  let bullet = new THREE.Mesh(bulletGeo, bulletMat);
  bullet.position.copy(camera.position);
  bullet.direction = new THREE.Vector3();
  camera.getWorldDirection(bullet.direction);
  bullets.push(bullet);
  scene.add(bullet);
}

// Guns
let guns = [
  {name:"Pistol", speed:1, color:0xff0000},
  {name:"Shotgun", speed:0.5, color:0xffff00},
  {name:"Rifle", speed:2, color:0x00ff00}
];
let currentGun = 0;
function selectGun(index){ currentGun = index; bulletSpeed = guns[index].speed; }

// Gamepad
let gamepad = null;
window.addEventListener("gamepadconnected", (e)=>{
  gamepad = navigator.getGamepads()[e.gamepad.index];
  console.log("Gamepad connected", gamepad.id);
});

// Animation loop
let clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  let delta = clock.getDelta();

  // Update bullets
  for(let i=bullets.length-1;i>=0;i--){
    let b = bullets[i];
    b.position.addScaledVector(b.direction, bulletSpeed);
    if(b.position.length() > 100){
      scene.remove(b);
      bullets.splice(i,1);
    }
  }

  // Gamepad input
  if(gamepad){
    gamepad = navigator.getGamepads()[gamepad.index];
    if(gamepad.buttons[0].pressed){ shoot(); } // Cross button
    let moveX = gamepad.axes[0];
    let moveZ = gamepad.axes[1];
    let moveY = gamepad.axes[3];
    controls.moveRight(moveX*delta*5);
    controls.moveForward(-moveZ*delta*5);
    camera.rotation.y -= moveY*delta*2;
  }

  renderer.render(scene, camera);
}
animate();

// Mobile touch build
window.addEventListener('touchstart', (e)=>{
  let touch = e.touches[0];
  let vector = new THREE.Vector3(
    (touch.clientX / window.innerWidth) * 2 - 1,
    -(touch.clientY / window.innerHeight) * 2 + 1,
    0.5
  );
  vector.unproject(camera);
  let dir = vector.sub(camera.position).normalize();
  let distance = 5;
  let pos = camera.position.clone().add(dir.multiplyScalar(distance));
  addVoxel(Math.round(pos.x), Math.round(pos.y), Math.round(pos.z));
});

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
